<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="sappr — a fast, self-hostable web toolkit for pentesters. Encoding, hashing, QR, regex, beautify, strings and more, running entirely in your browser."
    />
    <title>sappr</title>
    <!--
      Apply the persisted/system theme before first paint to avoid a flash of
      the wrong theme (FOUC). Kept inline and tiny on purpose.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("sappr.theme"); // "light" | "dark" | "system" | null
          var mode = stored || "system";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = mode === "dark" || (mode === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
